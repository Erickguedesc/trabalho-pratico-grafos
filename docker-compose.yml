version: "3.9"


# =============================================================
#
#  ORDEM DE EXECUÇÃO:
#  1. docker compose up -d neo4j
#  2. docker compose --profile mine up --build minerador
#  3. docker compose --profile run up --build app
#
# =============================================================

services:

  # -----------------------------------------------------------
  # NEO4J — banco de dados de grafos (sempre de pé)
  # Painel web: http://localhost:7474
  # Bolt:       bolt://localhost:7687
  # -----------------------------------------------------------
  neo4j:
    image: neo4j:5
    container_name: grafos-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # painel web
      - "7687:7687"   # bolt (driver Python)
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-senha123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-senha123}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # MINERADOR — coleta dados do GitHub e salva JSON em /dados
  # Roda uma vez e termina (profile: mine)
  # -----------------------------------------------------------
  minerador:
    build:
      context: .
      dockerfile: codigo/mineirador/Dockerfile
    container_name: grafos-minerador
    profiles: ["mine"]
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OWNER: ${OWNER}
      REPO: ${REPO}
      OUTPUT_DIR: /dados
    volumes:
      - ./dados:/dados
    networks:
      - grafos-net

  # -----------------------------------------------------------
  # APP — demo CLI + interface Streamlit
  # Depende do Neo4j estar saudável (profile: run)
  # -----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: codigo/app/Dockerfile
    container_name: grafos-app
    profiles: ["run"]
    ports:
      - "8501:8501"   # Streamlit
    environment:
      INPUT_DIR: /dados
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-senha123}
    volumes:
      - ./dados:/dados
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - grafos-net

# =============================================================
# VOLUMES — persistem fora dos containers
# =============================================================
volumes:
  neo4j_data:
    name: grafos-neo4j-data
  neo4j_logs:
    name: grafos-neo4j-logs

# =============================================================
# REDE interna — app e minerador enxergam o neo4j pelo hostname
# =============================================================
networks:
  grafos-net:
    name: grafos-network